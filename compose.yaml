services:
  # The web app is fully DECOUPLED from backup — no litestream, no backup mounts.
  # Restoring a fresh/wiped deployment is the explicit one-shot `restore` service below.
  app:
    image: leaf-annotation:latest
    # Run as the invoking user + shared group. PUID/PGID are injected by ./run.sh (PUID=your uid,
    # PGID=the APP_GROUP gid from .env) — not typed or committed. Defaults to root (0:0) if you call
    # `docker compose` directly without them, so this stays portable.
    user: "${PUID:-0}:${PGID:-0}"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: "${GIT_SHA:-}"
        BUILD_TIME: "${BUILD_TIME:-}"
    env_file: .env
    environment:
      HT_DATA_DIR: /data
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - leaf-data:/data
    restart: unless-stopped

  # Backup sidecars are opt-in: `docker compose --profile backup up`. Without the
  # profile (and without BACKUP_DIR), `docker compose up` runs the app alone with
  # no backup — the right default for local/dev. BACKUP_DIR is required to opt in.
  litestream:
    image: litestream/litestream:0.3.13
    profiles: ["backup"]
    user: "${PUID:-0}:${PGID:-0}"      # write backups as the operator, not root
    command: ["replicate", "-config", "/etc/litestream.yml"]
    # :9090 serves litestream's own Prometheus metrics (ops/litestream.yml's `addr`) — scraped
    # by backup-status below, over the compose network only. Not published to the host.
    expose: ["9090"]
    volumes:
      - leaf-data:/data
      - ./ops/litestream.yml:/etc/litestream.yml:ro
      - ${BACKUP_DIR:?BACKUP_DIR must be set to use the backup/restore profiles}/db:/backup/db
    restart: unless-stopped

  lsyncd:
    image: leaf-lsyncd:latest
    profiles: ["backup"]
    user: "${PUID:-0}:${PGID:-0}"      # mirror files as the operator, not root
    volumes:
      - leaf-data:/data:ro
      - ./ops/lsyncd.conf.lua:/etc/lsyncd.conf.lua:ro
      - ${BACKUP_DIR:?BACKUP_DIR must be set to use the backup/restore profiles}/files:/backup/files
      # Shares ONLY lsyncd's own status file (not the backup data) with backup-status.
      - lsyncd-status:/var/run/lsyncd
    restart: unless-stopped

  # Tiny stdlib HTTP status sidecar: parses litestream's metrics + lsyncd's status file (never
  # the backup data itself) and serves GET /status for the main app to proxy. Keeps the app
  # fully decoupled from backup — see docs/plans/Plan — Admin sync-status panel.md (DECISION:
  # sidecar, 2026-07-01). No ${BACKUP_DIR} mount here either.
  backup-status:
    image: leaf-backup-status:latest
    build:
      context: .
      dockerfile: Dockerfile.backup-status
    profiles: ["backup"]
    environment:
      LITESTREAM_METRICS_URL: http://litestream:9090/metrics
      LSYNCD_STATUS_FILE: /var/run/lsyncd/status
      PORT: "8098"
    volumes:
      - lsyncd-status:/var/run/lsyncd:ro
    restart: unless-stopped

  # Explicit, one-shot restore for a fresh/wiped deployment — run BEFORE `up`:
  #   docker compose run --rm restore
  # Restores the DB from the litestream replica (skips if a DB already exists) and copies
  # the file backup back wholesale (all-or-nothing), then exits. Fully decoupled from the app.
  restore:
    image: litestream/litestream:0.3.13
    profiles: ["restore"]
    user: "${PUID:-0}:${PGID:-0}"      # restore into the volume as the operator, not root
    entrypoint: ["/bin/sh", "-c"]
    # busybox `cp -an /src/.` is unreliable (no -n; mishandles /.) and `tar xk` aborts on the
    # first conflict — so a plain tar pipe. Restore targets a fresh volume; the file mirror
    # excludes app.db*, so this only lays down images/jsons/manifest and never touches the DB
    # litestream just restored. DB ← litestream replica; files ← lsyncd mirror.
    command: ["litestream restore -if-db-not-exists -config /etc/litestream.yml /data/app.db && (cd /backup/files && tar cf - . | tar xf - -C /data) && echo '[restore] done'"]
    volumes:
      - leaf-data:/data
      - ./ops/litestream.yml:/etc/litestream.yml:ro
      - ${BACKUP_DIR:?BACKUP_DIR must be set to use the backup/restore profiles}/db:/backup/db:ro
      - ${BACKUP_DIR:?BACKUP_DIR must be set to use the backup/restore profiles}/files:/backup/files:ro

  test:
    image: leaf-annotation-test:latest
    profiles: ["test"]
    # /tmp in container: used by the Playwright fixture (FIXTURE_DIR = /tmp/leaf-e2e-fixture)
    # and by the webServer that Playwright starts internally (uv run leaf-annotation).
    # No volume mounts needed — entirely self-contained.

volumes:
  leaf-data:
    # Named volume — guaranteed local Docker-managed disk.
    # Never bind-mount /deltos here: SQLite must not live on NFS.
  lsyncd-status:
    # Tiny shared volume: ONLY lsyncd's self-reported status file, read-only on the
    # backup-status side. Never the backup data (${BACKUP_DIR}/files) itself.
