services:
  # The web app is fully DECOUPLED from backup — no litestream, no backup mounts.
  # Restoring a fresh/wiped deployment is the explicit one-shot `restore` service below.
  app:
    image: leaf-annotation:latest
    # Run as the invoking user + shared group. PUID/PGID are injected by ./deploy.py (PUID=your uid,
    # PGID=the [deploy].app_group gid) — not typed or committed. Defaults to root (0:0) if you call
    # `docker compose` directly without them, so this stays portable.
    user: "${PUID:-0}:${PGID:-0}"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: "${GIT_SHA:-}"
        BUILD_TIME: "${BUILD_TIME:-}"
    # NO `environment:` for app config. Secrets (secret_key, admin_password) never touch env
    # or the CLI (both leak via `docker inspect` / `ps`) — the whole resolved app config
    # rides as the `app-config` compose secret below, mounted at /run/secrets/app-config
    # and read by container_entry.py (Dockerfile CMD).
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - leaf-data:/data
    secrets:
      - app-config
    restart: unless-stopped

  # Backup sidecars (litestream, lsyncd, backup-status) and the one-shot `restore` service live
  # in compose.backup.yaml, NOT here — opt-in via file inclusion (`-f compose.yaml -f
  # compose.backup.yaml`), not just a `profiles:` filter. Compose interpolates ${VAR:?...} for
  # EVERY service at parse time regardless of profile, so a `${BACKUP_DIR:?...}` guard on a
  # service in THIS file would make plain `docker compose up` (no backup wanted) fail whenever
  # BACKUP_DIR is unset — which is exactly the first-time-user case. Splitting the file means
  # Compose never parses those services (or demands BACKUP_DIR) unless compose.backup.yaml is
  # explicitly included. See compose.backup.yaml's header for the full invocation set.

  test:
    image: leaf-annotation-test:latest
    profiles: ["test"]
    # /tmp in container: used by the Playwright fixture (FIXTURE_DIR = /tmp/leaf-e2e-fixture)
    # and by the webServer that Playwright starts internally (uv run leaf-annotation).
    # No volume mounts needed — entirely self-contained.

# Top-level `secrets:` block. deploy.py writes the resolved app-service config to an
# ephemeral /tmp file (mktemp -d, chmod 0700; the file itself 0600) and sets APP_CONFIG_FILE
# to its path; Compose reads the file at container-start and mounts it as
# /run/secrets/app-config (read-only) inside the app container. The container's
# entrypoint (container_entry.py, deploy-owned) reads it back via
# deploy_lib.launch_from_config_file and hands off to webapp.run(cfg). Secrets never leave
# the file; `docker inspect` and `ps` see only APP_CONFIG_FILE (a /tmp path), never the
# resolved values.
secrets:
  app-config:
    file: ${APP_CONFIG_FILE:?APP_CONFIG_FILE must be set — use ./deploy.py, not raw `docker compose`}

volumes:
  leaf-data:
    # Named volume — guaranteed local Docker-managed disk.
    # Never bind-mount /deltos here: SQLite must not live on NFS.
    # (lsyncd-status — the backup sidecars' own tiny status volume — is declared in
    # compose.backup.yaml, since only those sidecars use it.)
